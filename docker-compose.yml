version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: moove_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: moove_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: moove_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
